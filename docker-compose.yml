version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: roadsos_postgis
    environment:
      POSTGRES_USER: roadsos
      POSTGRES_PASSWORD: roadsos_password
      POSTGRES_DB: roadsos_db
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgis_data:
